<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min Min & Tinzar | Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Playfair Display',serif;
background:black;
color:white;
overflow-x:hidden;
}

/* ===== INTRO SCREEN ===== */
#intro{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle, #111, black);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
backdrop-filter:blur(10px);
}

#intro h1{
font-family:'Great Vibes';
color:gold;
font-size:55px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px gold;}
to{text-shadow:0 0 25px gold;}
}

/* ===== CLICK BUTTON ===== */
.open-btn{
margin-top:25px;
padding:14px 30px;
font-size:18px;
border:2px solid gold;
background:transparent;
color:gold;
border-radius:50px;
cursor:pointer;
transition:0.4s;
position:relative;
overflow:hidden;
}

.open-btn:hover{
background:gold;
color:black;
transform:scale(1.1);
box-shadow:0 0 25px gold;
}

/* ===== HERO ===== */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1529636798458-92182e662485') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.hero h1{
font-family:'Great Vibes';
font-size:70px;
color:gold;
z-index:2;
animation:fadeIn 2s;
}

/* ===== SECTION ===== */
.section{
padding:80px 20px;
text-align:center;
}

.title{
font-size:32px;
color:gold;
margin-bottom:20px;
}

/* ===== OUR STORY ===== */
.story-box{
max-width:600px;
margin:auto;
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
border:1px solid gold;
}

/* ===== FADE ===== */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h1>Min Min & Tinzar</h1>
<p style="color:white;margin-top:10px;">Wedding Invitation</p>

<!-- UPDATED BUTTON -->
<button class="open-btn" onclick="openSite()">✨ Click to Open Invitation ✨</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6d60d23fcb.mp3">
</audio>

<!-- HERO -->
<div class="hero">
<h1>Min Min & Tinzar</h1>
</div>

<!-- OUR STORY -->
<div class="section">
<div class="title">Our Story</div>
<div class="story-box">
💛 Our journey began 5 months ago...  
From strangers to lovers, every moment became a memory we cherish.  
Today, we celebrate love, trust, and forever together.
</div>
</div>

<script>

/* OPEN EFFECT */
function openSite(){
document.getElementById("intro").style.opacity="0";
document.getElementById("intro").style.transform="scale(1.2)";
document.getElementById("intro").style.transition="1s";

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("music").play();
},1000);
}

</script>

</body>
</html>
