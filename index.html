<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
font-family:'Playfair Display',serif;
overflow:hidden;
color:white;
}

/* ===== ENVELOPE SCREEN ===== */
#envelopeScreen{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#111,#000);
z-index:9999;
flex-direction:column;
}

.envelope{
width:280px;
height:180px;
background:#1a1a1a;
border:2px solid gold;
position:relative;
box-shadow:0 0 20px rgba(255,215,0,0.3);
}

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:140px solid transparent;
border-right:140px solid transparent;
border-top:90px solid gold;
}

.seal{
width:60px;
height:60px;
background:gold;
border-radius:50%;
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
color:black;
cursor:pointer;
transition:0.4s;
}

.seal:hover{
transform:translateX(-50%) scale(1.1);
box-shadow:0 0 20px gold;
}

/* ===== MAIN CARD ===== */
#card{
display:none;
height:100vh;
overflow:auto;
background:url('https://images.unsplash.com/photo-1529636798458-92182e662485') center/cover no-repeat;
}

.overlay{
background:rgba(0,0,0,0.6);
min-height:100vh;
padding:40px 20px;
text-align:center;
}

.title{
font-family:'Great Vibes';
font-size:60px;
color:gold;
margin-top:30px;
}

.box{
max-width:600px;
margin:20px auto;
padding:20px;
border:1px solid gold;
border-radius:15px;
background:rgba(0,0,0,0.5);
}

/* BUTTONS */
.btn{
padding:10px 20px;
border:none;
border-radius:25px;
background:gold;
color:black;
cursor:pointer;
margin-top:10px;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div id="envelopeScreen">
<div class="envelope">
<div class="seal" onclick="openCard()">✉</div>
</div>
<p style="color:gold;margin-top:20px;">Tap seal to open invitation</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6d60d23fcb.mp3">
</audio>

<!-- CARD -->
<div id="card">
<div class="overlay">

<div class="title">Min Min & Tinzar</div>

<div class="box">
💍 Wedding Invitation<br>
📅 29 April 2026
</div>

<div class="box">
💛 Our Story: 5 Months of Love & Memories
</div>

<div class="box">
📍 Location:<br>
Abu Dhabi Cavill Family Court<br>

<button class="btn" onclick="openMap()">Open Google Map</button>
</div>

<div class="box">
📸 Gallery<br>
<img src="https://i.postimg.cc/XNzq3WZW/file-000000002f9871f4beb2f36b81dfad9f.png" width="100%">
</div>

</div>
</div>

<script>

/* OPEN ENVELOPE */
function openCard(){
document.getElementById("envelopeScreen").style.display="none";
document.getElementById("card").style.display="block";
document.getElementById("music").play();
}

/* OPEN MAP */
function openMap(){
window.open("https://maps.app.goo.gl/oiBfbmRSpkfr8DmYA","_blank");
}

</script>

</body>
</html>
