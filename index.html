<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min Min & Tinzar | Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Playfair Display',serif;
    background:#000;
    color:#fff;
    overflow-x:hidden;
}

/* ===== LOADING SCREEN ===== */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:99999;
}

#loader h1{
    font-family:'Great Vibes';
    color:gold;
    font-size:40px;
    animation: pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

/* ===== HERO ===== */
.hero{
    height:100vh;
    background:url(https://i.postimg.cc/XNzq3WZW/file-000000002f9871f4beb2f36b81dfad9f.png) center/cover no-repeat;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.hero h1{
    font-family:'Great Vibes';
    font-size:70px;
    color:gold;
    z-index:2;
    animation:fadeIn 2s ease;
}

.hero p{
    font-size:20px;
    z-index:2;
    margin-top:10px;
}

/* ===== MUSIC BUTTON ===== */
#musicBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:gold;
    color:black;
    border:none;
    padding:10px 15px;
    border-radius:50px;
    cursor:pointer;
    z-index:999;
}

/* ===== SECTION ===== */
.section{
    padding:80px 20px;
    text-align:center;
}

.title{
    font-size:35px;
    color:gold;
    margin-bottom:20px;
}

/* ===== GALLERY ===== */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.gallery img{
    width:100%;
    border-radius:15px;
    transition:0.5s;
    cursor:pointer;
}

.gallery img:hover{
    transform:scale(1.08);
}

/* ===== COUNTDOWN ===== */
.countdown{
    font-size:30px;
    color:gold;
}

/* ===== RSVP ===== */
form{
    max-width:400px;
    margin:auto;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

button{
    background:gold;
    border:none;
    padding:10px;
    width:100%;
    cursor:pointer;
}

/* ===== PARTICLES ===== */
.particle{
    position:fixed;
    width:5px;
    height:5px;
    background:gold;
    border-radius:50%;
    opacity:0.7;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{transform:translateY(0);}
    to{transform:translateY(-100vh);}
}

/* ===== FADE ===== */
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <h1>Min Min & Tinzar</h1>
    <p style="color:white">Loading Invitation...</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6d60d23fcb.mp3">
</audio>

<button id="musicBtn" onclick="toggleMusic()">🎵 Music</button>

<!-- HERO -->
<div class="hero">
<div class="overlay"></div>
<h1>Min Min & Tinzar</h1>
<p>29 April 2026</p>
<p>Abu Dhabi Cavill Family Court</p>
</div>

<!-- COUNTDOWN -->
<div class="section">
<div class="title">Countdown to Wedding</div>
<div class="countdown" id="countdown"></div>
</div>

<!-- GALLERY -->
<div class="section">
<div class="title">Our Memories</div>
<div class="gallery">
<img src="https://i.postimg.cc/XNzq3WZW/file-000000002f9871f4beb2f36b81dfad9f.png">
<img src="https://i.postimg.cc/1XF8K4zJ/IMG-20260206-150042.jpg">
<img src="https://i.postimg.cc/QC7FqVMq/IMG-20260207-WA0015.jpg">
<img src="https://i.postimg.cc/KjT154Yr/IMG-20260207-WA0034.jpg">
<img src="https://i.postimg.cc/7hz5NbLB/MTXX-20260206-164149865.jpg">
</div>
</div>

<!-- LOCATION -->
<div class="section">
<div class="title">Location</div>
<iframe src="https://maps.google.com/maps?q=Abu%20Dhabi%20Family%20Court&output=embed"
width="100%" height="300"></iframe>
</div>

<!-- RSVP -->
<div class="section">
<div class="title">RSVP</div>
<form onsubmit="event.preventDefault();alert('Thank you for your response!');">
<input type="text" placeholder="Your Name" required>
<input type="number" placeholder="Number of Guests" required>
<textarea placeholder="Message"></textarea>
<button>Send</button>
</form>
</div>

<script>

/* ===== REMOVE LOADER ===== */
window.onload=function(){
    setTimeout(()=>{
        document.getElementById("loader").style.display="none";
        document.getElementById("music").play();
    },2000);
}

/* ===== MUSIC CONTROL ===== */
function toggleMusic(){
    let music=document.getElementById("music");
    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}

/* ===== COUNTDOWN ===== */
let target=new Date("April 29, 2026 00:00:00").getTime();

setInterval(()=>{
    let now=new Date().getTime();
    let diff=target-now;

    let d=Math.floor(diff/(1000*60*60*24));
    let h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    let m=Math.floor((diff%(1000*60*60))/(1000*60));
    let s=Math.floor((diff%(1000*60))/1000);

    document.getElementById("countdown").innerHTML=
    d+" Days : "+h+" H : "+m+" M : "+s+" S";
},1000);

/* ===== PARTICLES ===== */
setInterval(()=>{
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(p);

    setTimeout(()=>p.remove(),6000);
},200);

/* ===== FIREWORK EFFECT ===== */
setInterval(()=>{
    let f=document.createElement("div");
    f.innerHTML="✨";
    f.style.position="fixed";
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    f.style.fontSize="20px";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1000);
},300);

</script>

</body>
</html>
