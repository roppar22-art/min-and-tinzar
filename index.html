<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Min Min & Tinzar — Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Great+Vibes&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>

<style>
:root{
  --green-dark:#3b4a3a;
  --green-light:#6b7f5e;
  --blush:#f5ede8;
  --blush-deep:#d4b8ae;
  --gold-light:#e8d5a8;
  --text-dark:#2a2a2a;
  --text-mid:#5a5a5a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Jost',sans-serif;
  background:var(--blush);
  overflow:hidden;
}

.page{
  position:fixed;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition:.4s;
  overflow-y:auto;
}

.page.active{
  opacity:1;
  pointer-events:auto;
}

/* ENVELOPE */
#page-envelope{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.env-wrap{
  width:280px;
  cursor:pointer;
}

.envelope{
  width:100%;
  height:180px;
  background:var(--green-dark);
  position:relative;
  border-radius:6px;
}

.env-flap{
  position:absolute;
  top:0;
  width:100%;
  height:50%;
  background:linear-gradient(#4e6349,#2e3b2d);
  transform-origin:top;
  transition:.8s;
}

.env-wrap.opening .env-flap{
  transform:rotateX(-180deg);
}

/* DASHBOARD */
#page-dashboard{
  padding-top:20px;
}

.dash-hero{
  background:var(--green-dark);
  color:white;
  text-align:center;
  padding:30px;
}

.dash-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:12px;
}

.card{
  background:white;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
}

.bottom-row{
  display:flex;
  justify-content:space-around;
  margin-top:20px;
}

.faq-circle{
  width:80px;
  height:80px;
  border-radius:50%;
  background:var(--green-dark);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page-envelope">
  <div class="env-wrap" id="env">
    <div class="envelope">
      <div class="env-flap"></div>
    </div>
  </div>
  <p>Tap to open</p>
</div>

<!-- PAGE 2 -->
<div class="page" id="page-dashboard">
  <div class="dash-hero">
    <h2>Min Min & Tinzar</h2>
  </div>

  <div class="dash-grid">

    <div class="card" onclick="showPage('page-details')">
      Wedding Details
    </div>

    <div class="card" onclick="showPage('page-timeline')">
      Timeline
    </div>

    <div class="card" onclick="showPage('page-faq')">
      FAQ
    </div>

    <div class="card">
      RSVP
    </div>

  </div>

  <div class="bottom-row">
    <div style="font-size:30px;opacity:.4">🌼</div>

    <div class="faq-circle" onclick="showPage('page-faq')">
      <div>HELP</div>
    </div>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page-details">
  <h2 style="padding:20px">Wedding Details</h2>
  <button onclick="showPage('page-dashboard')">Back</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="page-timeline">
  <h2 style="padding:20px">Timeline</h2>
  <button onclick="showPage('page-dashboard')">Back</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="page-faq">
  <h2 style="padding:20px">FAQ</h2>
  <button onclick="showPage('page-dashboard')">Back</button>
</div>

<script>
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

document.getElementById("env").addEventListener("click",()=>{
  document.getElementById("env").classList.add("opening");

  setTimeout(()=>{
    showPage("page-dashboard");
  },800);
});
</script>

</body>
</html>
