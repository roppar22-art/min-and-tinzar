<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Min Min & Tinzar Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Jost:wght@300;400&display=swap" rel="stylesheet"/>

<style>
body{
  margin:0;
  font-family:Jost,sans-serif;
  background:#f5ede8;
  overflow:hidden;
}

.page{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.5s;
}

.page.active{
  opacity:1;
  pointer-events:auto;
}

/* ENVELOPE */
.envelope{
  width:280px;
  height:180px;
  background:#3b4a3a;
  border-radius:6px;
  position:relative;
  cursor:pointer;
}

.flap{
  position:absolute;
  width:100%;
  height:50%;
  top:0;
  background:linear-gradient(#4e6349,#2e3b2d);
  transform-origin:top;
  transition:.8s;
}

.open .flap{
  transform:rotateX(-180deg);
}

/* DASHBOARD */
.hero{
  background:#3b4a3a;
  color:#fff;
  width:100%;
  text-align:center;
  padding:30px 10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:15px;
  width:100%;
  max-width:420px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
}

.circle{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#3b4a3a;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* RSVP */
input,button{
  padding:10px;
  margin:5px;
  width:200px;
}

button{
  background:#3b4a3a;
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d0a1a5b6b6.mp3?filename=romantic-piano-ambient-110397.mp3" type="audio/mp3">
</audio>

<button onclick="toggleMusic()" style="position:fixed;top:10px;right:10px;z-index:999">🎵</button>

<!-- ENVELOPE -->
<div class="page active" id="envelopePage">
  <div class="envelope" id="env">
    <div class="flap"></div>
  </div>
  <p>Tap envelope</p>
</div>

<!-- DASHBOARD -->
<div class="page" id="dashPage">

  <div class="hero">
    <h1 style="font-family:Great Vibes">Min Min & Tinzar</h1>
    <p>Wedding Invitation</p>
  </div>

  <div class="grid">

    <div class="card" onclick="go('details')">Details</div>
    <div class="card" onclick="go('timeline')">Timeline</div>
    <div class="card" onclick="go('rsvp')">RSVP</div>

    <div class="card" onclick="openMap()">Location</div>

  </div>

  <div class="circle" onclick="go('faq')">HELP</div>

</div>

<!-- DETAILS -->
<div class="page" id="details">
  <h2>Wedding Details</h2>
  <button onclick="back()">Back</button>
</div>

<!-- TIMELINE -->
<div class="page" id="timeline">
  <h2>Timeline</h2>
  <button onclick="back()">Back</button>
</div>

<!-- RSVP -->
<div class="page" id="rsvp">
  <h2>RSVP Form</h2>

  <input id="name" placeholder="Your Name"/>
  <input id="guest" placeholder="Guests"/>

  <button onclick="saveRSVP()">Submit</button>

  <p id="msg"></p>

  <button onclick="back()">Back</button>
</div>

<!-- FAQ -->
<div class="page" id="faq">
  <h2>FAQ</h2>
  <button onclick="back()">Back</button>
</div>

<script>
let music = document.getElementById("music");

function toggleMusic(){
  if(music.paused){
    music.play();
  }else{
    music.pause();
  }
}

document.getElementById("env").addEventListener("click",()=>{
  document.getElementById("env").classList.add("open");

  setTimeout(()=>{
    go("dash");
  },800);
});

function go(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

  if(page==="dash") document.getElementById("dashPage").classList.add("active");
  else document.getElementById(page).classList.add("active");
}

function back(){
  go("dash");
}

function openMap(){
  window.open("https://maps.google.com?q=Abu+Dhabi+Wedding+Venue");
}

function saveRSVP(){
  let name=document.getElementById("name").value;
  let guest=document.getElementById("guest").value;

  localStorage.setItem("rsvp",JSON.stringify({name,guest}));

  document.getElementById("msg").innerText="Saved ✔ Thank you!";
}
</script>

</body>
</html>
