<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Jost:wght@300;400&display=swap" rel="stylesheet"/>

<style>
body{
  margin:0;
  font-family:Jost,sans-serif;
  background:#f5ede8;
  overflow:hidden;
}

.page{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.5s;
  padding:20px;
}

.page.active{
  opacity:1;
  pointer-events:auto;
}

/* ENVELOPE */
#page1{
  background:#f5ede8;
}

.envelope{
  width:280px;
  height:180px;
  background:#3b4a3a;
  border-radius:8px;
  position:relative;
  cursor:pointer;
}

.flap{
  position:absolute;
  width:100%;
  height:50%;
  top:0;
  background:linear-gradient(#4e6349,#2e3b2d);
  transform-origin:top;
  transition:.8s;
}

.open .flap{
  transform:rotateX(-180deg);
}

/* BUTTON */
button{
  padding:10px 15px;
  margin-top:10px;
  background:#3b4a3a;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* DASHBOARD */
#page2{
  background:#f5ede8;
}

.hero{
  text-align:center;
  background:#3b4a3a;
  color:white;
  width:100%;
  padding:25px;
}

.hero h1{
  font-family:"Great Vibes";
  font-size:40px;
}

/* IMAGE */
.couple{
  width:200px;
  height:200px;
  background:#ddd;
  border-radius:12px;
  margin:15px 0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

/* COUNTDOWN */
.countdown{
  font-size:18px;
  margin:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  width:100%;
  max-width:400px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

/* DETAILS */
#page3{
  background:#f5ede8;
}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  width:100%;
  max-width:350px;
  text-align:center;
}

/* MUSIC BUTTON */
#musicBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:999;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d0a1a5b6b6.mp3?filename=romantic-piano-ambient-110397.mp3">
</audio>

<button id="musicBtn" onclick="toggleMusic()">🎵</button>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <div class="envelope" id="env">
    <div class="flap"></div>
  </div>
  <p>Tap envelope</p>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">

  <div class="hero">
    <h1>Min Min & Tinzar</h1>
    <p>Wedding Invitation</p>
  </div>

  <div class="couple">💑</div>

  <div class="countdown" id="countdown"></div>

  <div class="grid">

    <div class="card" onclick="go('page3')">Details</div>
    <div class="card" onclick="go('page3')">Location</div>
    <div class="card" onclick="go('page3')">Time</div>
    <div class="card" onclick="go('page2')">Back</div>

  </div>

</div>

<!-- PAGE 3 -->
<div class="page" id="page3">

  <div class="box">
    <h2>Wedding Details</h2>

    <p>📍 Location: Abu Dhabi Wedding Hall</p>
    <p>🕒 Time: 6:00 PM</p>
    <p>📅 Date: 14 Dec 2025</p>

    <button onclick="go('page2')">⬅ Back</button>
  </div>

</div>

<script>

/* PAGE NAV */
function go(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ENVELOPE OPEN */
document.getElementById("env").addEventListener("click",()=>{
  document.getElementById("env").classList.add("open");

  setTimeout(()=>{
    go("page2");
  },800);
});

/* MUSIC */
let music=document.getElementById("music");

function toggleMusic(){
  if(music.paused) music.play();
  else music.pause();
}

/* COUNTDOWN */
let weddingDate = new Date("2025-12-14T18:00:00").getTime();

setInterval(()=>{
  let now = new Date().getTime();
  let diff = weddingDate - now;

  let days = Math.floor(diff/(1000*60*60*24));
  let hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  let mins = Math.floor((diff%(1000*60*60))/(1000*60));
  let secs = Math.floor((diff%(1000*60))/1000);

  document.getElementById("countdown").innerHTML =
  `⏳ ${days}d ${hours}h ${mins}m ${secs}s`;
},1000);

</script>

</body>
</html>
